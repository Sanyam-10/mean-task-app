name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/mean-backend:latest ./backend
          docker push ${{ secrets.DOCKER_USERNAME }}/mean-backend:latest

      - name: Build and push frontend
        run: |
          cd frontend
          npm install
          npm run build -- --project=angular-15-crud
          cat > Dockerfile.ci << 'DOCKERFILE'
          FROM nginx:alpine
          COPY dist/angular-15-crud /usr/share/nginx/html
          EXPOSE 80
          CMD ["nginx", "-g", "daemon off;"]
          DOCKERFILE
          docker build -t ${{ secrets.DOCKER_USERNAME }}/mean-frontend:latest -f Dockerfile.ci .
          docker push ${{ secrets.DOCKER_USERNAME }}/mean-frontend:latest

      - name: Build and push nginx proxy
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/mean-nginx:latest -f nginx.Dockerfile .
          docker push ${{ secrets.DOCKER_USERNAME }}/mean-nginx:latest

      - name: Copy docker-compose to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          source: "docker-compose.yml"
          target: "~/"

      - name: Deploy to VM
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            cd ~/
            docker-compose pull
            docker-compose down
            docker-compose up -d
            docker image prune -f
